<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>EOL & CVE Checker</title>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
  <header>
    <h1>EOL & CVE Checker</h1>
    <p class="subtitle">Estado de soporte + CVEs (best-effort) — modo GitHub Pages (sin backend)</p>
  </header>

  <main>
    <div class="card">
      <div class="row">
        <div class="field">
          <label for="tech">Tecnología</label>
          <input id="tech" placeholder="Ej: jquery, nginx, nodejs, dotnet, openssl" autocomplete="off"/>
        </div>

        <div class="field">
          <label for="version">Versión</label>
          <input id="version" placeholder="Ej: 3.6.1" autocomplete="off"/>
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button class="btn" id="btn">Consultar</button>
        </div>
      </div>

      <div class="hint">
        Fuentes (best-effort): OSV + KEV + NVD (si el navegador lo permite) + cache EOL local (si existe).
      </div>

      <div id="output" class="output"></div>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
